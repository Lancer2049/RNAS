# RNAS + FreeRADIUS Test Environment
#
# Usage:
#   docker compose up -d
#   docker compose logs -f accel-ppp
#   docker compose down
#
# Prerequisites:
#   - Linux host with PPP kernel modules (CONFIG_PPP=m, CONFIG_PPPOE=m)
#   - Docker Engine 20.10+
#
# Test flow:
#   PPPoE Client → accel-ppp:lo → RADIUS → freeradius:1812/1813 → PostgreSQL

services:
  accel-ppp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.accel-ppp
    container_name: rnas-accel-ppp
    privileged: true          # Required for kernel PPP modules
    network_mode: host        # Use host network for PPPoE Discovery (L2)
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    environment:
      - RADIUS_AUTH_SERVER=127.0.0.1
      - RADIUS_ACCT_SERVER=127.0.0.1
      - RADIUS_SECRET=testing123
    volumes:
      - ./configs/accel-ppp.conf:/etc/accel-ppp/accel-ppp.conf:ro
      - accel-ppp-logs:/var/log/accel-ppp
    command: >
      accel-pppd -c /etc/accel-ppp/accel-ppp.conf -d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "accel-pppd"]
      interval: 10s
      timeout: 3s
      retries: 3

  freeradius:
    build:
      context: ..
      dockerfile: docker/Dockerfile.freeradius
    container_name: rnas-freeradius
    network_mode: host
    environment:
      - POSTGRES_DB=radius
      - POSTGRES_USER=radius
      - POSTGRES_PASSWORD=radius
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./tests/radius/clients.conf:/etc/freeradius/3.0/clients.conf:ro
      - ./tests/radius/users:/etc/freeradius/3.0/users:ro
      - ./tests/radius/sites/rnas-test:/etc/freeradius/3.0/sites-enabled/rnas-test:ro
    command: >
      freeradius -f -l stdout
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "radtest", "testuser", "testpass", "127.0.0.1", "0", "testing123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  accel-ppp-logs:
  pgdata:
