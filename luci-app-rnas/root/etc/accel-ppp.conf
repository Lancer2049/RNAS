# Sample accel-ppp.conf for RNAS
# This file is auto-generated based on UCI configuration

[core]
thread-count=4
log-file=/var/log/accel-ppp/accel-ppp.log
pid-file=/var/run/accel-ppp/accel-ppp.pid

[ppp]
min-mtu=1280
mtu=1492
mru=1492

[pppoe]
interface=br-lan

[auth]
auth=Radius
radius-auth-port=1812
radius-acct-port=1813
radius-secret=testing123
radius-config=/etc/accel-ppp/radius.conf
radius-timeout=30
radius-retries=3

[acct]
interim-interval=300

[coa]
enable-coa=yes
radius-coa-port=3799

[ip-pool]
gw-pool-address=10.0.0.1
pool=10.0.0.2-10.0.0.254

[dns]
dns1=8.8.8.8
dns2=8.8.4.4

[log]
verbosity=3
log-file=/var/log/accel-ppp/accel-ppp.log
log-emergency=syslog
