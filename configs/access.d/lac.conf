# L2TP LAC (Access Concentrator) Configuration
# RNAS initiates L2TP tunnels to upstream LNS

[lac]
enabled = no

[tunnel "default"]
# Upstream LNS to connect to
peer_addr = 192.168.0.201
peer_port = 1701
host_addr = 192.168.0.203
host_port = 0
mode = lac
# Seconds between reconnection attempts
reconnect_interval = 30
