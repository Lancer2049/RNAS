# DHCP Server Configuration

[dhcp "lan"]
interface = lan
start = 100
limit = 100
leasetime = 12h

[dhcp_option "dns"]
list = 8.8.8.8,8.8.4.4

[relay]
# DHCP Relay Agent (RFC 3046) — forwards DHCP to upstream server
# MUTUAL EXCLUSION: When enabled, IPoE local DHCP must be disabled
# (both use port 67 — set ipoe=no in access.d/core.conf)
enabled = no
upstream = 192.168.0.202
giaddr = 192.168.100.1
interface = ens33
