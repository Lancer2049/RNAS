# CoovaChilli Captive Portal Configuration

[global]
enabled = no
interface = ens33
dhcp_if = ens33
net = 192.168.182.0/24
uam_server = https://hotspot.rnas.dev
radius_server = 192.168.0.202
radius_secret = ${RNAS_RADIUS_SECRET:-testing123}

# Note: CoovaChilli not available in Ubuntu 24.04 apt repositories.
# Manual installation required: https://github.com/coova/coova-chilli
# Alternative: use accel-ppp IPoE with RADIUS auth for similar functionality
