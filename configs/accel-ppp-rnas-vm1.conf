# RNAS accel-ppp.conf — Generated 2026-04-26
# Managed by RNAS project: https://github.com/Lancer2049/RNAS
# Previous config backed up to /etc/accel-ppp.conf.rnas-backup

[modules]
log_file
radius
pptp
l2tp
sstp
pppoe
#ipoe  # 注释掉ipoe，避免网络中断

auth_pap
auth_chap_md5
auth_mschap_v1
auth_mschap_v2

ippool
pppd_compat
connlimit

[core]
log-error=/var/log/accel-ppp/core.log
thread-count=4
daemon=1

[common]
sid-source=seq
check-ip=1
max-sessions=1000

[ppp]
verbose=1
min-mtu=1280
mtu=1492
mru=1492
ipv4=require
ipv6=deny
lcp-echo-interval=20
lcp-echo-timeout=120
unit-cache=1

[radius]
dictionary=/usr/share/accel-ppp/radius/dictionary
nas-identifier=rnas
#nas-ip-address=192.168.0.84
gw-ip-address=192.168.100.1
server=192.168.0.85,testing123,auth-port=1812,acct-port=1813,req-limit=50,fail-timeout=0,max-fail=10,weight=1
dae-server=192.168.0.84:3799,testing123
dae-allowed=192.168.0.85
verbose=1
timeout=3
max-try=3
acct-timeout=120
acct-on=1

[client-ip-range]
192.168.100.0/24

[ip-pool]
gw-ip-address=192.168.100.1
attr=Framed-Pool
192.168.100.10-100

[pptp]
verbose=1
interface=pptp+

[pppoe]
verbose=1
interface=ens33
called-sid=mac

[l2tp]
verbose=1
interface=l2tp+
dictionary=/usr/share/accel-ppp/l2tp/dictionary

[sstp]
verbose=1
accept=ssl,proxy

[cli]
verbose=1
tcp=127.0.0.1:2001

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
log-emerg=/var/log/accel-ppp/emerg.log
log-fail-file=/var/log/accel-ppp/auth-fail.log
copy=1
level=3

[connlimit]
limit=10/min
burst=3
timeout=60

[pppd-compat]
verbose=1
ip-up=/etc/ppp/ip-up
ip-down=/etc/ppp/ip-down
radattr-prefix=/var/run/radattr
