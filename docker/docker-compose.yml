# RNAS Full-Stack Test Environment
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Services:
#   accel-ppp    — PPPoE/IPoE/L2TP access server (port 3799 CoA)
#   freeradius   — RADIUS auth/acct + PostgreSQL
#   rnas-api     — FastAPI management API (port 8099)
#   rnas-web     — Vue.js dashboard dev server (port 5173)
#   dnsmasq      — DHCP/DNS (optional, disabled by default)
#
# Test flow:
#   PPPoE Client → accel-ppp → RADIUS → freeradius:1812/1813 → PostgreSQL
#   Web Console → rnas-api:8099 → accel-cmd → accel-ppp
#   CoA → accel-ppp:3799 (from freeradius or API)

services:
  accel-ppp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.accel-ppp
    container_name: rnas-accel-ppp
    privileged: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    environment:
      - RADIUS_AUTH_SERVER=127.0.0.1
      - RADIUS_ACCT_SERVER=127.0.0.1
      - RADIUS_SECRET=testing123
    volumes:
      - ./configs/accel-ppp.conf:/etc/accel-ppp/accel-ppp.conf:ro
      - accel-ppp-logs:/var/log/accel-ppp
    command: >
      accel-pppd -c /etc/accel-ppp/accel-ppp.conf -d
    restart: unless-stopped

  freeradius:
    build:
      context: ..
      dockerfile: docker/Dockerfile.freeradius
    container_name: rnas-freeradius
    network_mode: host
    environment:
      - POSTGRES_DB=radius
      - POSTGRES_USER=radius
      - POSTGRES_PASSWORD=radius
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../tests/radius/clients.conf:/etc/freeradius/3.0/clients.conf:ro
      - ../tests/radius/users:/etc/freeradius/3.0/users:ro
    command: >
      freeradius -f -l stdout
    restart: unless-stopped

  rnas-api:
    image: python:3.12-slim
    container_name: rnas-api
    network_mode: host
    working_dir: /app
    volumes:
      - ../web/api:/app
      - ../cmd/rnas-config:/rnas-config
      - ../configs:/etc/rnas:ro
    environment:
      - PYTHONPATH=/app:/rnas-config
    command: >
      sh -c "pip install -q fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 8099"
    restart: unless-stopped
    depends_on:
      - accel-ppp

  rnas-web:
    image: node:22-slim
    container_name: rnas-web
    network_mode: host
    working_dir: /app
    volumes:
      - ../web/frontend:/app
    command: >
      sh -c "npm install -q && npx vite --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      - rnas-api

volumes:
  accel-ppp-logs:
  pgdata:
