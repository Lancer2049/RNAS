# FreeRADIUS clients.conf for RNAS-OpenWrt end-to-end testing
# Copy to /etc/freeradius/3.0/clients.conf or equivalent
#
# This config authorizes the RNAS-OpenWrt NAS to send RADIUS
# authentication, accounting, and CoA requests to the test FreeRADIUS server.

client rnas-openwrt {
	ipaddr = 192.168.0.84
	netmask = 32
	secret = testing123
	shortname = rnas-nas
	nas_type = other
	virtual_server = rnas-test

	# CoA support (Dynamic Authorization)
	coa_server = rnas-coa
}

client localhost {
	ipaddr = 127.0.0.1
	netmask = 32
	secret = testing123
	shortname = localhost
}
