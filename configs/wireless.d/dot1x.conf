# 802.1X Authentication Configuration

[dot1x]
# Enable 802.1X authenticator (requires hostapd on VM3)
enabled = no

# RADIUS server for EAP authentication
auth_server = 192.168.0.202
auth_port = 1812
auth_secret = ${RNAS_RADIUS_SECRET:-testing123}

# NAS identifier sent in RADIUS requests
nas_identifier = rnas-dot1x

# EAP methods to support
eap_methods = md5,peap,tls

# TLS certificates
ca_cert = /etc/rnas/ssl/dot1x/ca.crt
server_cert = /etc/rnas/ssl/dot1x/server.crt
private_key = /etc/rnas/ssl/dot1x/server.key

# FreeRADIUS EAP module (on VM2)
# Requires: ln -sf mods-available/eap mods-enabled/eap
# Verify: radtest testuser testpass localhost 0 testing123
