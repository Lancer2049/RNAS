# accel-ppp.conf - SSTP Server Configuration
# RADIUS NAS - SSTP Protocol Support

[core]
thread-count=4
log-file=/var/log/accel-ppp/accel-ppp.log
pid-file=/var/run/accel-ppp/accel-ppp.pid

[sstp]
# SSTP server configuration
listen=0.0.0.0
#listen-ipv6=::
port=443
#bind=192.168.100.1
#hello-interval=60
#timeout=600
#keepalive-interval=30
#ssl-ciphers=DEFAULT
#ssl-prefer-server-ciphers=1
#ssl-ca-file=/etc/ssl/certs/ca-certificates.crt
#ssl-cert-file=/etc/accel-ppp/sstp-cert.pem
#ssl-key-file=/etc/accel-ppp/sstp-key.pem
#hostname=openwrt-nas.local
#http-host=openwrt-nas.local
#http-port=80
#http-timeout=30
#fallback-http-port=8080

[ppp]
min-mtu=1280
mtu=1400
mru=1400
#verbosity=3

[auth]
# RADIUS authentication
auth=Radius
radius-auth-port=1812
radius-acct-port=1813
radius-secret=testing123
radius-config=/etc/accel-ppp/radius.conf
radius-timeout=30
radius-retries=3

[acct]
# RADIUS accounting
interim-interval=300

[coa]
# RADIUS CoA (Dynamic Authorization)
enable-coa=yes
radius-coa-port=3799

[ip-pool]
# IP pool for SSTP clients
#gw-pool-address=10.3.0.1
#pool=10.3.0.2-10.3.0.254,255.255.255.255

[ dns ]
# DNS servers
#dns1=8.8.8.8
#dns2=8.8.4.4

[log]
verbosity=3
log-file=/var/log/accel-ppp/accel-ppp.log
log-emergency=syslog

[shell]
enable-chap=yes
enable-pap=yes
enable-mschap-v1=yes
enable-mschap-v2=yes
enable-radius=yes
max-logins=1

[sstp-ssl]
# SSTP SSL/TLS options
#ssl-protocols=tlsv1.2 tlsv1.3
#ssl-verify=1
#ssl-verify-depth=3
#ssl-check-name=1
