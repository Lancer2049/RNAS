# accel-ppp.conf - IPoE (DHCP+) Server Configuration
# RADIUS NAS - IPoE Protocol Support

[core]
thread-count=4
log-file=/var/log/accel-ppp/accel-ppp.log
pid-file=/var/run/accel-ppp/accel-ppp.pid

[ipoe]
# IPoE interface configuration
interface=br-lan
#username=ifcfg
#password=ifcfg
#lease-time=600
#renew-time=300
#rebind-time=210
#broadcast=1
#listen=192.168.100.1
#mode=L2
#encapsulation=eth
#start=dhcp
#ipunnumbered=10.0.0.1
#ifname=ipoe%d
#master-interface=eth0
#vlan-mon=eth0,100-200
#vlan-timeout=60
#vlan-hw-accel=1
#shared=0
#dmac=00:00:00:00:00:00
#called=<Called-Station-Id format>
#calling=<Calling-Station-Id format>
#unit-cache=1

[auth]
# RADIUS authentication
auth=Radius
radius-auth-port=1812
radius-acct-port=1813
radius-secret=testing123
radius-config=/etc/accel-ppp/radius.conf
radius-timeout=30
radius-retries=3
# Username format: MAC address or DHCP option
username-format=mac
# Alternative: use DHCP relay agent
#username-format=dhcp

[acct]
# RADIUS accounting
interim-interval=300
session-timeout=0
idle-timeout=120
# Accounting for IPoE uses session tracking
#session-timeout=0
# Accounting start on DHCP lease
#start-acct-on-dhcp-nak=no

[coa]
# RADIUS CoA (Dynamic Authorization)
enable-coa=yes
radius-coa-port=3799

[ip-pool]
# IP pool for IPoE clients
#gw-pool-address=10.0.0.1
#pool=10.0.0.2-10.0.0.254,255.255.255.255
#gw-inetwork=10.0.1.0/24
#pool=10.0.1.2-10.0.1.254
#range-disable=10.0.0.10-10.0.0.20

[ dns ]
# DNS servers
#dns1=8.8.8.8
#dns2=8.8.4.4

[log]
verbosity=3
log-file=/var/log/accel-ppp/accel-ppp.log
log-emergency=syslog

[ipoe-sharing]
# Share sessions across MAC addresses
# Enables multiple devices per user
#enabled=1
#table=ipoe_sharing

[dhcpv4]
# DHCPv4 options for IPoE
# Option 82 (Relay Agent Information)
#proxy=1
# Vendor Class Identifier
#vci=OpenWrt-IPoE
# Capture DHCP options
#lease-time=600
#siaddr=10.0.0.1
