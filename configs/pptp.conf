# accel-ppp.conf - PPTP Server Configuration
# RADIUS NAS - PPTP Protocol Support

[core]
thread-count=4
log-file=/var/log/accel-ppp/accel-ppp.log
pid-file=/var/run/accel-ppp/accel-ppp.pid

[pptp]
# PPTP server configuration
listen=0.0.0.0
#listen-ipv6=::
port=1723
#bind=192.168.100.1
#hello-interval=60
#timeout=600
#rtimeout=1
#rtimeout-cap=16
#retrytimeout=5
#max-attempts=3
#echo-interval=30
#echo-failure=3

[ppp]
min-mtu=1280
mtu=1400
mru=1400
#verbosity=3

[auth]
# RADIUS authentication
auth=Radius
radius-auth-port=1812
radius-acct-port=1813
radius-secret=testing123
radius-config=/etc/accel-ppp/radius.conf
radius-timeout=30
radius-retries=3

[acct]
# RADIUS accounting
interim-interval=300

[coa]
# RADIUS CoA (Dynamic Authorization)
enable-coa=yes
radius-coa-port=3799

[ip-pool]
# IP pool for PPTP clients
#gw-pool-address=10.2.0.1
#pool=10.2.0.2-10.2.0.254,255.255.255.255

[ dns ]
# DNS servers
#dns1=8.8.8.8
#dns2=8.8.4.4

[log]
verbosity=3
log-file=/var/log/accel-ppp/accel-ppp.log
log-emergency=syslog

[shell]
enable-chap=yes
enable-pap=yes
enable-mschap-v1=yes
enable-mschap-v2=yes
enable-radius=yes
max-logins=1

[pptp-mppe]
# MPPE encryption for PPTP
optional
#require-mppe
#prefer-compression=no
#deny-40
#deny-56
#require-128bit
