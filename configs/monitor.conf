# RNAS Monitoring Configuration
# SNMP, NetFlow, and syslog settings

[snmp]
enabled = yes
community = public
location = NAS Lab
contact = admin@rnas.local
listen = 0.0.0.0:161

[netflow]
enabled = yes
collector = 192.168.0.202
port = 2055
interface = br-lan
sample_rate = 1

[syslog]
enabled = no
server = 192.168.0.202
port = 514
protocol = udp
facility = local0
