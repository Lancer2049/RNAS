# accel-ppp.conf - PPPoE Server Configuration
# RADIUS NAS - PPPoE Protocol Support

[core]
thread-count=4
log-file=/var/log/accel-ppp/accel-ppp.log
pid-file=/var/run/accel-ppp/accel-ppp.pid

[ppp]
min-mtu=1280
mtu=1492
mru=1492
acf=0
pcf=0
#verbosity=3

[pppoe]
# Bridge interface for PPPoE
interface=br-lan
# PPPoE service name (empty = any)
#service-name=
#AC-name=OpenWrt-NAS
#padi-locations=0
#pado-locations=0
#pads-locations=0
#padt-locations=0
#ifname=ppp%d
#session-timeout=0
#idle-timeout=0
#max-session=10000
#max-session-per-vlan=1000
#vlan-mon=eth0,10-20
#vlan-timeout=60
#vlan-hw-accel=1

[auth]
# RADIUS authentication
auth=Radius
radius-auth-port=1812
radius-acct-port=1813
radius-secret=testing123
radius-config=/etc/accel-ppp/radius.conf
radius-timeout=30
radius-retries=3
# Local authentication fallback
#auth=local
#auth chap yes
#auth pap yes

[acct]
# RADIUS accounting
interim-interval=300
#no-acct-timeout=600
#keepalive-interval=60
#radius-accounting-port=1813

[coa]
# RADIUS CoA (Dynamic Authorization)
enable-coa=yes
radius-coa-port=3799
#radius-coa-secret=testing123
#coa-immediate-update=yes

[ip-pool]
# IP address pool
#gw-pool-address=10.0.0.1
#pool=10.0.0.2-10.0.0.254,255.255.255.255
#gw-inetwork=10.0.1.0/24
#pool=10.0.1.2-10.0.1.254

[ dns ]
# DNS servers
#dns1=8.8.8.8
#dns2=8.8.4.4

[log]
verbosity=3
log-file=/var/log/accel-ppp/accel-ppp.log
log-emergency=syslog
log-facility-daemon
#log-facility-local1
#log-facility-local2
#log-facility-local3
#log-facility-local4
#log-facility-local5
#log-facility-local6
#log-facility-local7

[ppp-static-ip]
# Static IP assignments by username
#username=10.0.0.10

[ppp-mppe]
# MPPE encryption (optional)
#optional
#require-mppe
#prefer-compression=yes
#deny-any

[ppp-dns]
# DNS from RADIUS
accept-peer-dns=yes
#default-dns=8.8.8.8

[connlimit]
# Connection limits
#limit=1000
#burst=50
#timeout=10

[shell]
# CLI access via accel-cmd
enable-chap=yes
enable-pap=yes
enable-mschap-v1=yes
enable-mschap-v2=yes
enable-radius=yes
max-logins=1
