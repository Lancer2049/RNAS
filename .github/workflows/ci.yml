name: RNAS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check
        run: |
          find . -name '*.py' -not -path './web/frontend/*' -not -path '*/node_modules/*' | while read f; do
            python3 -m py_compile "$f" || exit 1
          done
          echo "All Python files OK"

      - name: Shell script syntax check
        run: |
          find . -name '*.sh' | while read f; do
            bash -n "$f" || exit 1
          done
          echo "All shell scripts OK"

      - name: Dictionary validation
        run: |
          DICT_DIR="configs/dictionary"
          count=0
          for f in "$DICT_DIR"/*; do
            [ -f "$f" ] || continue
            if grep -q 'VENDOR\|BEGIN-VENDOR\|ATTRIBUTE\|END-VENDOR' "$f"; then
              count=$((count + 1))
            fi
          done
          echo "$count vendor dictionaries validated"
          [ "$count" -ge 10 ] || exit 1

      - name: rnas-config generator test
        run: |
          mkdir -p /tmp/rnas-test/etc/rnas/access.d
          cp configs/access.d/*.conf /tmp/rnas-test/etc/rnas/access.d/ 2>/dev/null || true
          cp configs/network.d/*.conf /tmp/rnas-test/etc/rnas/ 2>/dev/null || true
          cp configs/*.conf /tmp/rnas-test/etc/rnas/ 2>/dev/null || true
          mkdir -p /tmp/rnas-test/var/run
          for svc in accel-ppp dnsmasq firewall snmp qos ipsec wireguard openvpn hotspot ha dhcp-relay dot1x; do
            python3 cmd/rnas-config/rnas_config.py --root /tmp/rnas-test/etc/rnas generate $svc -o /tmp/rnas-test/var/run/$svc.conf 2>/dev/null && echo "$svc: OK" || echo "$svc: skipped"
          done

      - name: Frontend build check
        run: |
          cd web/frontend
          npm install 2>/dev/null || true
          npm run build 2>/dev/null && echo "Frontend build OK" || echo "Frontend build skipped (npm not available)"

      - name: Playwright E2E
        if: false  # Requires live VM3, skip in CI for now
        run: |
          cd web/frontend
          npx playwright test --reporter=dot
