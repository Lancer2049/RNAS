# DHCP Server Configuration

[dhcp "lan"]
interface = lan
start = 100
limit = 100
leasetime = 12h

[dhcp_option "dns"]
list = 8.8.8.8,8.8.4.4

[relay]
# DHCP Relay Agent (RFC 3046) — forwards DHCP to upstream server
# When enabled, IPoE local DHCP server is disabled (port 67 conflict)
enabled = no
upstream = 192.168.0.202
giaddr = 192.168.100.1
interface = ens33
